<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Án Cá Nhân | Coming Soon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CÀI ĐẶT CHUNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFF0F5; 
            color: #4E342E;
            overflow: hidden; /* Ẩn thanh cuộn vì trang này chỉ có 1 màn hình */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Nền hoa nhí giống trang Kinh nghiệm */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNGRkZGRkYiIGZpbGwtb3BhY2l0eT0iMC41Ii8+PC9zdmc+');
            background-repeat: repeat; opacity: 0.8; z-index: -1;
        }

        /* --- NÚT QUAY LẠI --- */
        .back-btn {
            position: absolute; top: 30px; left: 30px;
            background: #F48FB1; color: #fff; text-decoration: none;
            padding: 8px 20px; border-radius: 20px; font-weight: 600;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-btn:hover { background: #D81B60; transform: translateX(-5px); }

        /* --- KHUNG NỘI DUNG CHÍNH --- */
        .coming-soon-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(216, 27, 96, 0.15);
            border: 2px dashed #F8BBD0;
            max-width: 600px;
            width: 90%;
            animation: floatUpDown 3s ease-in-out infinite; /* Hiệu ứng lơ lửng */
        }

        /* Icon trang trí */
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: spinSlow 6s linear infinite;
            display: inline-block;
        }

        /* Tiêu đề lớn */
        .coming-soon-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #D81B60;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Đoạn văn bản nhỏ */
        .coming-soon-box p {
            font-size: 1.2rem;
            color: #6D4C41;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* --- HIỆU ỨNG ANIMATION --- */
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 600px) {
            .coming-soon-box h1 { font-size: 2.5rem; }
            .coming-soon-box p { font-size: 1.1rem; }
            .coming-soon-box { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">&larr; Quay lại trang chủ</a>

    <div class="coming-soon-box">
        <div class="icon">🌸</div>
        <h1>Đang Cập Nhật...</h1>
        <p>Mình đang trong quá trình chăm chút và hoàn thiện những dự án siêu thú vị. Bạn hãy cùng đón chờ trong tương lai gần nhé!</p>
    </div>

</body>
</html>
